{{- $start := .Values.turn.portSettings.start -}}
{{- $end := add1 .Values.turn.portSettings.end -}}
{{- range $i := untilStep (int $start) (int $end) 1 }}
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: xmpp-turn-{{ $i }}
spec:
  parentRefs:
  - name: external
    namespace: envoy-gateway-system
    sectionName: xmpp-turn-{{ $i }}
  rules:
  - backendRefs:
    - name: ejabberd
      port: {{ $i }}
---
{{- end }}

